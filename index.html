<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
     
    <title>World clock</title>
</head>
<body>
    <div class="container">

    <h1>World clock</h1>

    <select>
        <option value="">Choose a city...</option>
        <option value="">Cape Town 🇿🇦</option>
        <option value="">Los Angeles 🇺🇸</option>
        <option value="">Lagos 🇺🇸</option>
    </select>

    <div class="city" id="Johannesburg">
      <div>
        <h1>Johannesburg 🇿🇦</h1>
        <div class="date"></div>
      </div>
        <div class="time"></small>
        </div>
    </div>

    <div class="city" id="jamaica">
      <div>
        <h1>Jamaica 🇯🇲</h1>
        <div class="date"></div>
      </div>
        <div class="time">
        </div>
    </div>
</div>

    </footer>
    
    <script src="index.js"></script>
</body>
</html>
