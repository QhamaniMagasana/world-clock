<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
     
    <title>World clock</title>
</head>
<body>
    <div class="container">

    <h1>World clock</h1>

    <select>
        <option value="">Choose a city...</option>
        <option value="">Cape Town 🇿🇦</option>
        <option value="">Los Angeles 🇺🇸</option>
        <option value="">Lagos 🇺🇸</option>
    </select>

    <div class="city">
      <div>
        <h1>Johannesburg 🇿🇦</h1>
        <div class="date">May 11th 2026</div>
      </div>
        <div class="time">10:41:52 <small>AM</small>
        </div>
    </div>

    <div class="city">
      <div>
        <h1>Harare 🇿🇼</h1>
        <div class="date">May 11th 2026</div>
      </div>
        <div class="time">10:41:52 
            <small>AM</small>
        </div>
    </div>
</div>
    <footer>

    </footer>
    
    <script src="index.js"></script>
</body>
</html>
